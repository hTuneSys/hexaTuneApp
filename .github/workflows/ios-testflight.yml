name: "iOS → App Store / TestFlight (hexaTune Core)"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Build environment"
        type: choice
        required: true
        options:
          - test
          - stage
          - prod
        default: "test"

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: hexatuneapp

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment }}
      BUNDLE_ID: com.hexatune.hexatuneapp
      PROFILE_TYPE: IOS_APP_STORE

    steps:
      - name: Resolve distribution target
        run: |
          case "$ENVIRONMENT" in
            test)
              DIST_TARGET="testflight_internal"
              ;;
            stage)
              DIST_TARGET="testflight_external"
              ;;
            prod)
              DIST_TARGET="app_store"
              ;;
            *)
              echo "❌ Unknown environment: $ENVIRONMENT"; exit 1
              ;;
          esac
          echo "DIST_TARGET=$DIST_TARGET" >> $GITHUB_ENV
          echo "🍎 Environment: $ENVIRONMENT → Target: $DIST_TARGET"
        working-directory: .

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ~/.cocoapods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('hexatuneapp/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.IOS_CERT_P12 }}
          p12-password: ${{ secrets.IOS_CERT_PASSWORD }}

      - name: Download provisioning profile(s)
        uses: Apple-Actions/download-provisioning-profiles@v5
        with:
          bundle-id: ${{ env.BUNDLE_ID }}
          profile-type: ${{ env.PROFILE_TYPE }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Show code signing identities (debug)
        run: |
          security find-identity -v -p codesigning || true
          ls -l "$HOME/Library/MobileDevice/Provisioning Profiles" || true

      - name: Derive BUILD_NUMBER from run_number
        run: |
          BUILD_NUMBER=$((10000 + GITHUB_RUN_NUMBER))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "🔢 Using BUILD_NUMBER=$BUILD_NUMBER"

      - name: Create environment file
        run: |
          echo "${{ secrets[format('ENV_FILE_{0}', env.ENVIRONMENT)] }}" > .env.${{ env.ENVIRONMENT }}
          echo "🔐 Created .env.${{ env.ENVIRONMENT }}"

      - name: Configure App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/fastlane"
          python3 - <<'PY'
          import os, json
          key = os.environ["ASC_PRIVATE_KEY"].replace("\\n","\n")
          payload = {
            "key_id": os.environ["ASC_KEY_ID"],
            "issuer_id": os.environ["ASC_ISSUER_ID"],
            "key": key,
            "in_house": False
          }
          with open(os.environ["GITHUB_WORKSPACE"] + "/fastlane/api_key.json","w") as f:
            json.dump(payload, f)
          PY
          echo "APP_STORE_CONNECT_API_KEY_PATH=$GITHUB_WORKSPACE/fastlane/api_key.json" >> $GITHUB_ENV

      - name: Flutter analyze
        run: flutter analyze --no-pub

      - name: Build & Upload via Fastlane
        env:
          DIST_TARGET: ${{ env.DIST_TARGET }}
        run: |
          cd "$GITHUB_WORKSPACE"
          bundle exec fastlane ios beta

      - name: Verify FFI symbols in binary
        if: always()
        run: |
          echo "=== Searching for Runner binary ==="
          APP_BINARY=$(find build/ios/archive -path "*/Runner.app/Runner" -type f 2>/dev/null | head -1)
          if [ -z "$APP_BINARY" ]; then
            echo "❌ Runner binary not found in archive"
            find build/ios/archive -type f -name "Runner*" 2>/dev/null || true
            find build/ios/archive -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          echo "Binary: $APP_BINARY"
          echo "Size: $(ls -lh "$APP_BINARY" | awk '{print $5}')"
          echo ""

          echo "=== 1. Strip status (is nlist present?) ==="
          NM_RAW=$(nm "$APP_BINARY" 2>&1 | head -5)
          echo "$NM_RAW"
          NM_TOTAL=$(nm "$APP_BINARY" 2>/dev/null | wc -l || echo 0)
          NM_GLOBAL=$(nm -gU "$APP_BINARY" 2>/dev/null | wc -l || echo 0)
          echo "Total nlist entries: $NM_TOTAL | Global defined: $NM_GLOBAL"
          echo ""

          echo "=== 2. Export trie (full dump, first 30 lines) ==="
          objdump --macho --exports-trie "$APP_BINARY" 2>&1 | head -30
          EXPORT_TOTAL=$(objdump --macho --exports-trie "$APP_BINARY" 2>/dev/null | wc -l || echo 0)
          echo "Total export trie entries: $EXPORT_TOTAL"
          echo ""

          echo "=== 3. FFI symbols in nlist ==="
          nm -gU "$APP_BINARY" 2>/dev/null | grep -E '_?htp_|_?htd_' | head -40 || echo "(none found)"
          echo ""

          echo "=== 4. FFI symbols in export trie ==="
          objdump --macho --exports-trie "$APP_BINARY" 2>/dev/null | grep -E '_?htp_|_?htd_' | head -40 || echo "(none found)"
          echo ""

          echo "=== 5. strings check (symbol names in binary code) ==="
          HTP_STRINGS=$(strings "$APP_BINARY" | grep -c "htp_at_encode" || echo 0)
          HTD_STRINGS=$(strings "$APP_BINARY" | grep -c "htd_engine_init" || echo 0)
          echo "htp_at_encode string occurrences: $HTP_STRINGS"
          echo "htd_engine_init string occurrences: $HTD_STRINGS"
          echo ""

          echo "=== 6. Mach-O load commands (LC_SYMTAB + LC_DYLD) ==="
          otool -l "$APP_BINARY" 2>/dev/null | grep -A4 'LC_SYMTAB\|LC_DYLD_INFO\|LC_DYLD_EXPORTS' || echo "(no matching load commands)"
          echo ""

          echo "=== 7. Section sizes ==="
          size -m "$APP_BINARY" 2>/dev/null | head -20 || echo "(size command failed)"
          echo ""

          echo "=== 8. ffi_force_export.c references in binary ==="
          strings "$APP_BINARY" | grep -i "ffi_force" | head -5 || echo "(no ffi_force references)"
          echo ""

          echo "=== DIAGNOSIS ==="
          if echo "$NM_RAW" | grep -qi "no symbols"; then
            echo "📋 Binary is STRIPPED (nlist removed) — nm results are unreliable"
            echo "📋 Relying on export trie and strings checks only"
          fi
          if [ "$EXPORT_TOTAL" -eq 0 ] 2>/dev/null; then
            echo "❌ Export trie is COMPLETELY EMPTY — -exported_symbols_list did NOT reach linker"
          elif [ "$EXPORT_TOTAL" -gt 0 ] 2>/dev/null; then
            echo "📋 Export trie has $EXPORT_TOTAL entries"
            FFI_EXPORTS=$(objdump --macho --exports-trie "$APP_BINARY" 2>/dev/null | grep -cE '_?htp_|_?htd_' || echo 0)
            if [ "$FFI_EXPORTS" -eq 0 ] 2>/dev/null; then
              echo "❌ Export trie has entries but NONE are FFI symbols"
            else
              echo "✅ Found $FFI_EXPORTS FFI symbols in export trie"
            fi
          fi
          if [ "$HTP_STRINGS" -gt 0 ] 2>/dev/null || [ "$HTD_STRINGS" -gt 0 ] 2>/dev/null; then
            echo "📋 Symbol name strings FOUND in binary — code likely linked in"
          else
            echo "⚠️ Symbol name strings NOT found — symbols may not be in binary code"
          fi

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ios-ipa-${{ env.ENVIRONMENT }}
          path: hexatuneapp/build/ios/ipa/*.ipa
          if-no-files-found: ignore
