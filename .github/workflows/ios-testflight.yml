name: "iOS → App Store / TestFlight (hexaTune Core)"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Build environment"
        type: choice
        required: true
        options:
          - test
          - stage
          - prod
        default: "test"

jobs:
  build-and-upload:
    runs-on: macos-26
    timeout-minutes: 60
    outputs:
      build_number: ${{ steps.build-number.outputs.build_number }}
    defaults:
      run:
        working-directory: hexatuneapp

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment }}
      BUNDLE_ID: com.hexatune.hexatuneapp
      PROFILE_TYPE: IOS_APP_STORE

    steps:
      - name: Resolve distribution target
        run: |
          case "$ENVIRONMENT" in
            test)
              DIST_TARGET="testflight_internal"
              ;;
            stage)
              DIST_TARGET="testflight_external"
              ;;
            prod)
              DIST_TARGET="app_store"
              ;;
            *)
              echo "❌ Unknown environment: $ENVIRONMENT"; exit 1
              ;;
          esac
          echo "DIST_TARGET=$DIST_TARGET" >> $GITHUB_ENV
          echo "🍎 Environment: $ENVIRONMENT → Target: $DIST_TARGET"
        working-directory: .

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ~/.cocoapods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('hexatuneapp/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.IOS_CERT_P12 }}
          p12-password: ${{ secrets.IOS_CERT_PASSWORD }}

      - name: Download provisioning profile(s)
        uses: Apple-Actions/download-provisioning-profiles@v5
        with:
          bundle-id: ${{ env.BUNDLE_ID }}
          profile-type: ${{ env.PROFILE_TYPE }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Show code signing identities (debug)
        run: |
          security find-identity -v -p codesigning || true
          ls -l "$HOME/Library/MobileDevice/Provisioning Profiles" || true

      - name: Derive BUILD_NUMBER from run_number
        id: build-number
        run: |
          BUILD_NUMBER=$((10000 + GITHUB_RUN_NUMBER))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "🔢 Using BUILD_NUMBER=$BUILD_NUMBER"

      - name: Create environment file
        run: |
          echo "${{ secrets[format('ENV_FILE_{0}', env.ENVIRONMENT)] }}" > .env.${{ env.ENVIRONMENT }}
          echo "🔐 Created .env.${{ env.ENVIRONMENT }}"

      - name: Configure App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/fastlane"
          python3 - <<'PY'
          import os, json
          key = os.environ["ASC_PRIVATE_KEY"].replace("\\n","\n")
          payload = {
            "key_id": os.environ["ASC_KEY_ID"],
            "issuer_id": os.environ["ASC_ISSUER_ID"],
            "key": key,
            "in_house": False
          }
          with open(os.environ["GITHUB_WORKSPACE"] + "/fastlane/api_key.json","w") as f:
            json.dump(payload, f)
          PY
          echo "APP_STORE_CONNECT_API_KEY_PATH=$GITHUB_WORKSPACE/fastlane/api_key.json" >> $GITHUB_ENV

      - name: Flutter analyze
        run: flutter analyze --no-pub

      - name: Prepare link map output directory
        run: mkdir -p ios/build

      - name: Build & Upload via Fastlane
        env:
          DIST_TARGET: ${{ env.DIST_TARGET }}
        run: |
          cd "$GITHUB_WORKSPACE"
          bundle exec fastlane ios beta

      - name: Verify FFI symbols in binary
        if: always()
        run: |
          set +e

          echo "=== 0. Effective build settings ==="
          SETTINGS=$(xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner -configuration Release -sdk iphoneos \
            -showBuildSettings 2>/dev/null)
          echo "$SETTINGS" | grep -E 'OTHER_LDFLAGS|EXPORTED_SYMBOLS_FILE|STRIP|DEAD_CODE|SRCROOT|LD_GENERATE_MAP|LD_MAP_FILE' || \
            echo "(xcodebuild -showBuildSettings failed)"
          echo ""

          echo "=== 0b. Verify FFI export configuration ==="
          PASS=true
          if echo "$SETTINGS" | grep -q 'export_dynamic'; then
            echo "✅ -export_dynamic found (preserves globals through LTO)"
          else
            echo "❌ -export_dynamic NOT found"; PASS=false
          fi
          if echo "$SETTINGS" | grep -q 'exported_symbols_list\|EXPORTED_SYMBOLS_FILE'; then
            echo "✅ Export list found (places symbols in export trie)"
          else
            echo "❌ No EXPORTED_SYMBOLS_FILE or -exported_symbols_list found"; PASS=false
          fi
          DCS=$(echo "$SETTINGS" | grep 'DEAD_CODE_STRIPPING' | head -1 | awk '{print $NF}')
          if [ "$DCS" = "NO" ]; then
            echo "✅ DEAD_CODE_STRIPPING = NO (prevents Rust FFI code stripping)"
          else
            echo "❌ DEAD_CODE_STRIPPING = $DCS (should be NO)"; PASS=false
          fi
          if echo "$SETTINGS" | grep 'OTHER_LDFLAGS' | grep -q 'no_exported_symbols'; then
            echo "❌ -no_exported_symbols found (silently disables export trie!)"; PASS=false
          else
            echo "✅ No -no_exported_symbols override"
          fi
          if [ "$PASS" = true ]; then
            echo "✅ FFI export configuration correct"
          else
            echo "⚠️ FFI export configuration incomplete"
          fi
          echo ""

          PROTO_LIB="ios/Frameworks/HexaTuneProto.xcframework/ios-arm64/libhexa_tune_proto_ffi.a"
          DSP_LIB="ios/Frameworks/HexaTuneDspFfi.xcframework/ios-arm64/libhexatune_dsp_ffi.a"

          echo "=== 0c. Duplicate Rust runtime symbol check ==="
          if [ -f "$PROTO_LIB" ] && [ -f "$DSP_LIB" ]; then
            PROTO_RT=$(nm -gU "$PROTO_LIB" 2>/dev/null | awk '{print $NF}' | grep -E '__rust_alloc|compiler_builtins' | sort -u)
            DSP_RT=$(nm -gU "$DSP_LIB" 2>/dev/null | awk '{print $NF}' | grep -E '__rust_alloc|compiler_builtins' | sort -u)
            if [ -z "$DSP_RT" ]; then
              DSP_RT=$(xcrun llvm-nm -gU "$DSP_LIB" 2>/dev/null | awk '{print $NF}' | grep -E '__rust_alloc|compiler_builtins' | sort -u)
            fi
            DUPS=$(comm -12 <(echo "$PROTO_RT") <(echo "$DSP_RT") 2>/dev/null | head -5)
            if [ -n "$DUPS" ]; then
              DUP_COUNT=$(echo "$DUPS" | wc -l | tr -d ' ')
              echo "⚠️ $DUP_COUNT shared Rust runtime symbols (handled by Proto dedup script):"
              echo "$DUPS" | head -3
            else
              echo "✅ No shared Rust runtime symbols detected"
            fi
          else
            echo "📋 Skipped (one or both .a files missing)"
          fi
          echo ""

          echo "=== 1a. Proto .a verification ==="
          if [ -f "$PROTO_LIB" ]; then
            SIZE=$(ls -lh "$PROTO_LIB" | awk '{print $5}')
            HTP_COUNT=0
            HTP_COUNT=$(nm -gU "$PROTO_LIB" 2>/dev/null | grep -c '_htp_') || true
            echo "✅ Proto .a ($SIZE) — $HTP_COUNT htp_ symbols"
            nm -gU "$PROTO_LIB" 2>/dev/null | grep '_htp_' | head -10
          else
            echo "❌ MISSING: $PROTO_LIB"
          fi
          echo ""

          echo "=== 1b. DSP .a verification ==="
          if [ -f "$DSP_LIB" ]; then
            SIZE=$(ls -lh "$DSP_LIB" | awk '{print $5}')
            HTD_COUNT=0
            HTD_COUNT=$(nm -gU "$DSP_LIB" 2>/dev/null | grep -c '_htd_') || true
            TOTAL_SYMS=0
            TOTAL_SYMS=$(nm -gU "$DSP_LIB" 2>/dev/null | wc -l | tr -d ' ') || true
            echo "📋 DSP .a ($SIZE) — $HTD_COUNT htd_ symbols, $TOTAL_SYMS total global"
            if [ "$HTD_COUNT" -gt 0 ]; then
              nm -gU "$DSP_LIB" 2>/dev/null | grep '_htd_' | head -25
            else
              echo "   htd_ not visible (expected: LTO+strip=symbols hides nlist)"
              echo "   Trying llvm-nm for bitcode archives..."
              LLVM_HTD=0
              LLVM_HTD=$(xcrun llvm-nm -gU "$DSP_LIB" 2>/dev/null | grep -c '_htd_') || true
              echo "   llvm-nm: $LLVM_HTD htd_ symbols"
              if [ "$LLVM_HTD" -gt 0 ]; then
                xcrun llvm-nm -gU "$DSP_LIB" 2>/dev/null | grep '_htd_' | head -10
              fi
              echo "   Object files in archive:"
              ar -t "$DSP_LIB" 2>/dev/null | head -10
            fi
          else
            echo "❌ MISSING: $DSP_LIB"
          fi
          echo ""

          echo "=== 2. Runner binary ==="
          APP_BINARY=$(find build/ios/archive -path "*/Runner.app/Runner" -type f 2>/dev/null | head -1)
          if [ -z "$APP_BINARY" ]; then
            echo "❌ Runner binary not found"
            exit 1
          fi
          echo "Binary: $APP_BINARY"
          echo "Size: $(ls -lh "$APP_BINARY" | awk '{print $5}')"
          echo ""

          echo "=== 2b. Mach-O load commands (export format) ==="
          xcrun otool -l "$APP_BINARY" 2>/dev/null | grep -E 'LC_DYLD_(EXPORTS_TRIE|INFO|CHAINED_FIXUPS)|LC_SYMTAB' -A2 | head -20 || echo "(otool failed)"
          echo ""

          echo "=== 3. Export trie (dyld_info preferred) ==="
          DYLD_EXPORTS=""
          if xcrun dyld_info -exports "$APP_BINARY" > /tmp/dyld_exports.txt 2>/dev/null; then
            DYLD_EXPORTS=/tmp/dyld_exports.txt
            head -80 "$DYLD_EXPORTS"
            EXPORT_TOTAL=$(grep -c '0x' "$DYLD_EXPORTS" 2>/dev/null) || EXPORT_TOTAL=0
            echo "Total export trie entries (dyld_info): $EXPORT_TOTAL"
          else
            echo "(dyld_info unavailable, falling back to objdump)"
            objdump --macho --exports-trie "$APP_BINARY" 2>&1 | head -80
            EXPORT_TOTAL=0
            EXPORT_TOTAL=$(objdump --macho --exports-trie "$APP_BINARY" 2>/dev/null | grep -c '0x') || true
            echo "Total export trie entries (objdump): $EXPORT_TOTAL"
          fi
          echo ""

          echo "=== 4. FFI symbols in export trie ==="
          FFI_EXPORTS=0
          if [ -n "$DYLD_EXPORTS" ]; then
            FFI_EXPORTS=$(grep -cE 'htp_|htd_' "$DYLD_EXPORTS" 2>/dev/null) || FFI_EXPORTS=0
            grep -E 'htp_|htd_|force_link' "$DYLD_EXPORTS" | head -40 || echo "(none found)"
          else
            FFI_EXPORTS=$(objdump --macho --exports-trie "$APP_BINARY" 2>/dev/null | grep -cE 'htp_|htd_') || FFI_EXPORTS=0
            objdump --macho --exports-trie "$APP_BINARY" 2>/dev/null | grep -E 'htp_|htd_|force_link' | head -40 || echo "(none found)"
          fi
          echo "FFI export count: $FFI_EXPORTS"
          echo ""

          echo "=== 5. Section sizes ==="
          size -m "$APP_BINARY" 2>/dev/null | head -15 || echo "(size command failed)"
          echo ""

          echo "=== 6. strings check for symbol names ==="
          HTP_STR=0
          HTP_STR=$(strings "$APP_BINARY" | grep -c "htp_at_encode") || true
          HTD_STR=0
          HTD_STR=$(strings "$APP_BINARY" | grep -c "htd_engine_init") || true
          FORCE_STR=0
          FORCE_STR=$(strings "$APP_BINARY" | grep -c "force_link") || true
          echo "htp_at_encode in strings: $HTP_STR"
          echo "htd_engine_init in strings: $HTD_STR"
          echo "hexa_force_link in strings: $FORCE_STR"
          echo ""

          echo "=== HARD VERIFICATION ==="
          BINARY_SIZE=$(ls -l "$APP_BINARY" | awk '{print $5}')
          echo "📋 Binary size: $(ls -lh "$APP_BINARY" | awk '{print $5}') ($BINARY_SIZE bytes)"
          echo "📋 Reference: Build#33 (-export_dynamic only) was 2.1M/2184144"
          echo "📋 Reference: Build#28-35 (stripped baseline) were 832K/851968"
          if [ "$BINARY_SIZE" -gt 1500000 ] 2>/dev/null; then
            echo "✅ Binary > 1.5M — Rust FFI code included"
          elif [ "$BINARY_SIZE" -gt 860000 ] 2>/dev/null; then
            echo "⚠️ Binary 860K–1.5M — Rust code partially included"
          else
            echo "❌ Binary ≤ 860K — Rust FFI code stripped"
          fi

          echo "=== STRICT PER-SYMBOL GATE ==="
          EXPORTS_DATA=""
          if [ -n "$DYLD_EXPORTS" ]; then
            EXPORTS_DATA=$(cat "$DYLD_EXPORTS")
          else
            EXPORTS_DATA=$(objdump --macho --exports-trie "$APP_BINARY" 2>/dev/null)
          fi
          REQUIRED_SYMS="htp_at_encode htd_engine_init hexa_force_link_symbols"
          GATE_PASS=true
          for sym in $REQUIRED_SYMS; do
            if echo "$EXPORTS_DATA" | grep -q "$sym"; then
              echo "✅ $sym found in export trie"
            else
              echo "❌ $sym NOT in export trie — dlsym will fail"
              GATE_PASS=false
            fi
          done
          echo "Total FFI exports: $FFI_EXPORTS"
          if [ "$GATE_PASS" = true ]; then
            echo "✅ All required symbols exported — dlsym should work at runtime"
          else
            echo "❌ FAIL: Required FFI symbols missing from export trie"
            echo "📋 Export trie: $EXPORT_TOTAL entries | strings: htp=$HTP_STR htd=$HTD_STR force=$FORCE_STR"
            echo "📋 If binary>1.5M but exports=0: code included but not exported"
            echo "📋 If binary<860K: code stripped entirely"
            exit 1
          fi

      - name: Link map analysis (FFI inclusion proof)
        if: always()
        run: |
          set +e
          echo "=== Link map: FFI symbol inclusion ==="
          # Primary: LD_MAP_FILE_PATH = $(SRCROOT)/build/Runner-FFI-LinkMap-$(CURRENT_ARCH).txt
          # SRCROOT = ios/ for the Runner target
          LINK_MAP=$(find ios/build -name "Runner-FFI-LinkMap*" -type f 2>/dev/null | head -1)
          if [ -z "$LINK_MAP" ]; then
            # Fallback: search DerivedData and flutter build dir
            LINK_MAP=$(find ~/Library/Developer/Xcode/DerivedData build/ios \
              -name "Runner-FFI-LinkMap*" -o -name "*-LinkMap*.txt" -o -name "ffi-link-map*" \
              2>/dev/null -type f | head -1)
          fi
          if [ -n "$LINK_MAP" ]; then
            echo "Link map: $LINK_MAP ($(ls -lh "$LINK_MAP" | awk '{print $5}'))"
            echo ""
            echo "--- Proto objects pulled from archive ---"
            grep -i 'proto_ffi\|htp_' "$LINK_MAP" | head -20 || echo "(none)"
            echo ""
            echo "--- DSP objects pulled from archive ---"
            grep -i 'dsp_ffi\|htd_' "$LINK_MAP" | head -20 || echo "(none)"
            echo ""
            echo "--- ffi_force_export.o ---"
            grep -i 'ffi_force_export' "$LINK_MAP" | head -5 || echo "(none)"
            echo ""
            echo "--- Dead stripped symbols (FFI related) ---"
            grep -i 'dead.*htp_\|dead.*htd_\|htp_.*dead\|htd_.*dead' "$LINK_MAP" | head -20 || echo "(none found — good)"
            echo ""
            echo "📋 Interpretation:"
            echo "   Symbol in link map but NOT in export trie → export policy problem"
            echo "   Symbol NOT in link map → archive extraction/retention problem"
          else
            echo "⚠️ Link map not found (check LD_GENERATE_MAP_FILE and LD_MAP_FILE_PATH)"
          fi

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ios-ipa-${{ env.ENVIRONMENT }}
          path: hexatuneapp/build/ios/ipa/*.ipa
          if-no-files-found: ignore

  distribute-external:
    needs: build-and-upload
    if: github.event.inputs.environment == 'stage'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      BUNDLE_ID: com.hexatune.hexatuneapp
      BUILD_NUMBER: ${{ needs.build-and-upload.outputs.build_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: .

      - name: Configure App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/fastlane"
          python3 - <<'PY'
          import os, json
          key = os.environ["ASC_PRIVATE_KEY"].replace("\\n","\n")
          payload = {
            "key_id": os.environ["ASC_KEY_ID"],
            "issuer_id": os.environ["ASC_ISSUER_ID"],
            "key": key,
            "in_house": False
          }
          with open(os.environ["GITHUB_WORKSPACE"] + "/fastlane/api_key.json","w") as f:
            json.dump(payload, f)
          PY
          echo "APP_STORE_CONNECT_API_KEY_PATH=$GITHUB_WORKSPACE/fastlane/api_key.json" >> $GITHUB_ENV

      - name: Distribute to External Testers
        run: |
          cd "$GITHUB_WORKSPACE"
          bundle exec fastlane ios distribute_external
