name: "iOS → App Store / TestFlight (hexaTune Core)"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Build environment"
        type: choice
        required: true
        options:
          - test
          - stage
          - prod
        default: "test"

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: hexatuneapp

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment }}
      BUNDLE_ID: com.hexatune.hexatuneapp
      PROFILE_TYPE: IOS_APP_STORE

    steps:
      - name: Resolve distribution target
        run: |
          case "$ENVIRONMENT" in
            test)
              DIST_TARGET="testflight_internal"
              ;;
            stage)
              DIST_TARGET="testflight_external"
              ;;
            prod)
              DIST_TARGET="app_store"
              ;;
            *)
              echo "❌ Unknown environment: $ENVIRONMENT"; exit 1
              ;;
          esac
          echo "DIST_TARGET=$DIST_TARGET" >> $GITHUB_ENV
          echo "🍎 Environment: $ENVIRONMENT → Target: $DIST_TARGET"
        working-directory: .

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ~/.cocoapods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('hexatuneapp/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.IOS_CERT_P12 }}
          p12-password: ${{ secrets.IOS_CERT_PASSWORD }}

      - name: Download provisioning profile(s)
        uses: Apple-Actions/download-provisioning-profiles@v5
        with:
          bundle-id: ${{ env.BUNDLE_ID }}
          profile-type: ${{ env.PROFILE_TYPE }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Show code signing identities (debug)
        run: |
          security find-identity -v -p codesigning || true
          ls -l "$HOME/Library/MobileDevice/Provisioning Profiles" || true

      - name: Derive BUILD_NUMBER from run_number
        run: |
          BUILD_NUMBER=$((10000 + GITHUB_RUN_NUMBER))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "🔢 Using BUILD_NUMBER=$BUILD_NUMBER"

      - name: Create environment file
        run: |
          echo "${{ secrets[format('ENV_FILE_{0}', env.ENVIRONMENT)] }}" > .env.${{ env.ENVIRONMENT }}
          echo "🔐 Created .env.${{ env.ENVIRONMENT }}"

      - name: Configure App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/fastlane"
          python3 - <<'PY'
          import os, json
          key = os.environ["ASC_PRIVATE_KEY"].replace("\\n","\n")
          payload = {
            "key_id": os.environ["ASC_KEY_ID"],
            "issuer_id": os.environ["ASC_ISSUER_ID"],
            "key": key,
            "in_house": False
          }
          with open(os.environ["GITHUB_WORKSPACE"] + "/fastlane/api_key.json","w") as f:
            json.dump(payload, f)
          PY
          echo "APP_STORE_CONNECT_API_KEY_PATH=$GITHUB_WORKSPACE/fastlane/api_key.json" >> $GITHUB_ENV

      - name: Flutter analyze
        run: flutter analyze --no-pub

      - name: Build & Upload via Fastlane
        env:
          DIST_TARGET: ${{ env.DIST_TARGET }}
        run: |
          cd "$GITHUB_WORKSPACE"
          bundle exec fastlane ios beta

      - name: Verify FFI symbols in binary
        if: always()
        run: |
          set +e

          echo "=== 0. Effective build settings ==="
          SETTINGS=$(xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner -configuration Release -sdk iphoneos \
            -showBuildSettings 2>/dev/null)
          echo "$SETTINGS" | grep -E 'OTHER_LDFLAGS|EXPORTED|STRIP|DEAD_CODE|SRCROOT' || \
            echo "(xcodebuild -showBuildSettings failed)"
          echo ""

          echo "=== 0b. Verify -export_dynamic in linker flags ==="
          if echo "$SETTINGS" | grep -q 'export_dynamic'; then
            echo "✅ -export_dynamic found in build settings"
          else
            echo "⚠️ -export_dynamic NOT found in build settings"
          fi
          echo ""

          echo "=== 0c. Verify ffi_exports.exp ==="
          SRCROOT=$(echo "$SETTINGS" | grep ' SRCROOT ' | awk '{print $NF}')
          EXP_FILE="${SRCROOT}/Runner/ffi_exports.exp"
          if [ -f "$EXP_FILE" ]; then
            SYMBOL_COUNT=$(grep -v '^#' "$EXP_FILE" | grep -v '^$' | wc -l | tr -d ' ')
            echo "✅ $EXP_FILE ($SYMBOL_COUNT symbols)"
            grep -v '^#' "$EXP_FILE" | grep -v '^$'
          else
            echo "❌ MISSING: $EXP_FILE (SRCROOT=$SRCROOT)"
          fi
          echo ""

          echo "=== 1a. Proto .a verification ==="
          PROTO_LIB="ios/Frameworks/HexaTuneProto.xcframework/ios-arm64/libhexa_tune_proto_ffi.a"
          if [ -f "$PROTO_LIB" ]; then
            SIZE=$(ls -lh "$PROTO_LIB" | awk '{print $5}')
            HTP_COUNT=0
            HTP_COUNT=$(nm -gU "$PROTO_LIB" 2>/dev/null | grep -c '_htp_') || true
            echo "✅ Proto .a ($SIZE) — $HTP_COUNT htp_ symbols"
            nm -gU "$PROTO_LIB" 2>/dev/null | grep '_htp_' | head -10
          else
            echo "❌ MISSING: $PROTO_LIB"
          fi
          echo ""

          echo "=== 1b. DSP .a verification ==="
          DSP_LIB="ios/Frameworks/HexaTuneDspFfi.xcframework/ios-arm64/libhexatune_dsp_ffi.a"
          if [ -f "$DSP_LIB" ]; then
            SIZE=$(ls -lh "$DSP_LIB" | awk '{print $5}')
            HTD_COUNT=0
            HTD_COUNT=$(nm -gU "$DSP_LIB" 2>/dev/null | grep -c '_htd_') || true
            TOTAL_SYMS=0
            TOTAL_SYMS=$(nm -gU "$DSP_LIB" 2>/dev/null | wc -l | tr -d ' ') || true
            echo "📋 DSP .a ($SIZE) — $HTD_COUNT htd_ symbols, $TOTAL_SYMS total global"
            if [ "$HTD_COUNT" -gt 0 ]; then
              nm -gU "$DSP_LIB" 2>/dev/null | grep '_htd_' | head -25
            else
              echo "   htd_ not visible (expected: LTO+strip=symbols hides nlist)"
              echo "   First 20 global symbols:"
              nm -gU "$DSP_LIB" 2>/dev/null | head -20
              echo "   Object files in archive:"
              ar -t "$DSP_LIB" 2>/dev/null | head -10
            fi
          else
            echo "❌ MISSING: $DSP_LIB"
          fi
          echo ""

          echo "=== 2. Runner binary ==="
          APP_BINARY=$(find build/ios/archive -path "*/Runner.app/Runner" -type f 2>/dev/null | head -1)
          if [ -z "$APP_BINARY" ]; then
            echo "❌ Runner binary not found"
            exit 1
          fi
          echo "Binary: $APP_BINARY"
          echo "Size: $(ls -lh "$APP_BINARY" | awk '{print $5}')"
          echo ""

          echo "=== 3. Export trie (full dump) ==="
          objdump --macho --exports-trie "$APP_BINARY" 2>&1 | head -80
          EXPORT_TOTAL=0
          EXPORT_TOTAL=$(objdump --macho --exports-trie "$APP_BINARY" 2>/dev/null | grep -c '0x') || true
          echo "Total export trie entries: $EXPORT_TOTAL"
          echo ""

          echo "=== 4. FFI symbols in export trie ==="
          FFI_EXPORTS=0
          FFI_EXPORTS=$(objdump --macho --exports-trie "$APP_BINARY" 2>/dev/null | grep -cE 'htp_|htd_') || true
          objdump --macho --exports-trie "$APP_BINARY" 2>/dev/null | grep -E 'htp_|htd_|force_link' | head -40 || echo "(none found)"
          echo "FFI export count: $FFI_EXPORTS"
          echo ""

          echo "=== 5. Section sizes ==="
          size -m "$APP_BINARY" 2>/dev/null | head -15 || echo "(size command failed)"
          echo ""

          echo "=== 6. strings check for symbol names ==="
          HTP_STR=0
          HTP_STR=$(strings "$APP_BINARY" | grep -c "htp_at_encode") || true
          HTD_STR=0
          HTD_STR=$(strings "$APP_BINARY" | grep -c "htd_engine_init") || true
          FORCE_STR=0
          FORCE_STR=$(strings "$APP_BINARY" | grep -c "force_link") || true
          echo "htp_at_encode in strings: $HTP_STR"
          echo "htd_engine_init in strings: $HTD_STR"
          echo "hexa_force_link in strings: $FORCE_STR"
          echo ""

          echo "=== HARD VERIFICATION ==="
          if [ "$FFI_EXPORTS" -gt 0 ]; then
            echo "✅ Found $FFI_EXPORTS FFI symbols in export trie — dlsym should work"
          else
            echo "❌ FAIL: No FFI symbols in export trie — dlsym will fail at runtime"
            echo "📋 Export trie: $EXPORT_TOTAL entries | strings: htp=$HTP_STR htd=$HTD_STR"
            echo "📋 If strings>0 but exports=0: symbols linked but not exported (LTO issue)"
            echo "📋 If strings=0: symbols not linked at all (inclusion issue)"
            exit 1
          fi

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ios-ipa-${{ env.ENVIRONMENT }}
          path: hexatuneapp/build/ios/ipa/*.ipa
          if-no-files-found: ignore
