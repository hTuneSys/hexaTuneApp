version = 1

[[annotations]]
path = [
  "package.json",
  "CHANGELOG.md",
  ".gitignore",
  "docs/CNAME",
  ".husky/**",
  "package-lock.json",
  "pnpm-lock.yaml",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2025 hexaTune LLC"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = [".github/ISSUE_TEMPLATE/**", ".github/PULL_REQUEST_TEMPLATE.md"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2025 hexaTune LLC"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = [
  "AGENTS.md",
  "openapi_old.json",
  "openapinew.json",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2025 hexaTune LLC"
SPDX-License-Identifier = "MIT"

# Figma design reference files
[[annotations]]
path = [
  "page_figma_datas/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2025 hexaTune LLC"
SPDX-License-Identifier = "MIT"

# Flutter app: generated code, config, and metadata
[[annotations]]
path = [
  "hexatuneapp/**/*.freezed.dart",
  "hexatuneapp/**/*.g.dart",
  "hexatuneapp/lib/src/core/di/injection.config.dart",
  "hexatuneapp/.metadata",
  "hexatuneapp/.gitignore",
  "hexatuneapp/.env.*",
  "hexatuneapp/devtools_options.yaml",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2025 hexaTune LLC"
SPDX-License-Identifier = "MIT"

